                ${mustArr.map(item => `<li>${processTags(item)}</li>`).join('')}
            </ul>

            <h2>📚 学习资源</h2>
            <p><b>📄 必读文档/检索：</b></p>
            <ul class="task-list">
                ${docsArr.map(item => `<li>${linkify(item)}</li>`).join('')}
            </ul>
            <p><b>📺 视频输入：</b></p>
            <ul class="task-list">
                ${vidsArr.length && vidsArr[0] !== '无额外视频，集中精力输出' ? vidsArr.map(item => `<li>${linkify(item)}</li>`).join('') : '<li><i>今日为实战打磨日，无强制视频输入。</i></li>'}
            </ul>

            <h2>🛠 动手实操（必做）</h2>
            <ul class="task-list">
                ${tasksArr.map(item => `<li>${processTags(linkify(item))}</li>`).join('')}
            </ul>

            <h2>⏳ 效率时间表（建议节奏）</h2>
            <table>
                <thead>
                    <tr>
                        <th width="16%">时间段</th>
                        <th width="48%">要做什么（知识点/实操）</th>
                        <th width="36%">应该收获什么（颗粒度产出）</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>00:00-00:10</td>
                        <td>复盘昨日错题；写下今天 3 个待解疑问。</td>
                        <td>3 个焦点问题 + 进入状态</td>
                    </tr>
                    <tr>
                        <td>00:10-00:55</td>
                        <td><b>高浓度输入：</b><br>观看视频并粗读文档，建立直觉与脉络。</td>
                        <td>机制运转的因果链（大白话版）</td>
                    </tr>
                    <tr>
                        <td>00:55-01:35</td>
                        <td><b>深读与笔记：</b><br>精读底层文档，抓取核心参数、边界条件与报错限制。</td>
                        <td>10条关键笔记/术语 + 架构草图</td>
                    </tr>
                    <tr>
                        <td>01:35-01:50</td>
                        <td><b>间隔休息与巩固：</b><br>制作 Notion/Anki 记忆闪卡。</td>
                        <td>恢复精力，固化知识</td>
                    </tr>
                    <tr>
                        <td>01:50-02:40</td>
                        <td><b>动手验证（核心）：</b><br>进入测试网或浏览器，对照文档进行真实数据查验。</td>
                        <td>验证截图 + 发现理论与实际的差别</td>
                    </tr>
                    <tr>
                        <td>02:40-03:15</td>
                        <td><b>高价值产出：</b><br>梳理成可用于面试的作品集材料。</td>
                        <td><b>当日交付物：</b><br>${data.Output}</td>
                    </tr>
                    <tr>
                        <td>03:15-03:30</td>
                        <td><b>闭卷自测：</b><br>看下方的清单，对着墙壁讲出答案并录音。</td>
                        <td>暴露盲点，完成学习闭环</td>
                    </tr>
                </tbody>
            </table>

            <h2>📝 闭卷自测清单（完成打勾）</h2>
            <ul class="checkbox-list">
                ${mustArr.map(item => {
                    let text = item.replace(/^能/, '');
                    return `<li><input type="checkbox"> <b>[概念]</b> ${processTags(text)}</li>`;
                }).join('')}
                <li><input type="checkbox"> <b>[产品化]</b> 如果让你设计涉及该机制的产品，列出 3 个致命风险点与防御策略。</li>
                <li><input type="checkbox"> <b>[表达]</b> 你能否向不涉及 Web3 的互联网产品同事，用 2 分钟讲清楚这个机制？</li>
                <li><input type="checkbox"> <b>[交付]</b> 检查当日产出 <b>《${data.Output.substring(0,25)}...》</b> 是否逻辑严密且排版美观。</li>
            </ul>
        </div>
        `;
        
        container.innerHTML += html;
    });
</script>
</body>
</html>
